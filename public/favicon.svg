<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="logo-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#2563eb" />
      <stop offset="100%" stopColor="#1d4ed8" />
    </linearGradient>
    <linearGradient id="logo-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#22c55e" />
      <stop offset="100%" stopColor="#15803d" />
    </linearGradient>
    <linearGradient id="logo-teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#10b981" />
      <stop offset="100%" stopColor="#06b6d4" />
    </linearGradient>
    <linearGradient id="logo-cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0284c7" />
      <stop offset="100%" stopColor="#10b981" />
    </linearGradient>
    <linearGradient id="logo-circle" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#0284c7" />
      <stop offset="100%" stopColor="#10b981" />
    </linearGradient>
    
    <!-- Path for curved text -->
    <path id="text-path" d="M 32,82 A 72,72 0 0,1 168,82" fill="none" />
  </defs>

  <!-- Outer Double Ring Arcs (Top) -->
  <path d="M 25,75 A 80,80 0 0,1 175,75" fill="none" stroke="url(#logo-circle)" strokeWidth="2.5" strokeLinecap="round" />
  <path d="M 36,77 A 68,68 0 0,1 164,77" fill="none" stroke="url(#logo-circle)" strokeWidth="1.5" strokeLinecap="round" />

  <!-- Outer Double Ring Arcs (Bottom) -->
  <path d="M 25,125 A 80,80 0 0,0 155,135" fill="none" stroke="url(#logo-circle)" strokeWidth="2.5" strokeLinecap="round" />
  <path d="M 36,123 A 68,68 0 0,0 148,128" fill="none" stroke="url(#logo-circle)" strokeWidth="1.5" strokeLinecap="round" />

  <!-- Curved Text "CARE IN EVERY BEAT" -->
  <text>
    <textPath href="#text-path" startOffset="50%" textAnchor="middle" fill="#2563eb" fontSize="13" fontFamily="system-ui, -apple-system, sans-serif" fontWeight="800" letterSpacing="1.2">
      CARE IN EVERY BEAT
    </textPath>
  </text>

  <!-- ECG Wave on Left (intersects borders) -->
  <path d="M 5,115 L 23,115 L 28,103 L 32,115 L 35,118 L 39,80 L 43,145 L 48,105 L 53,115 L 65,115" 
        fill="none" stroke="url(#logo-teal)" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" />

  <!-- Medical Cross on Right -->
  <path d="M 155,115 L 185,115 M 170,100 L 170,130" 
        fill="none" stroke="url(#logo-cross)" strokeWidth="9" strokeLinecap="round" />

  <!-- Heart Left Side (Blue Outline) -->
  <path d="M 100,160 C 65,138 48,110 48,90 C 48,70 65,58 82,75 C 91,84 100,95 100,102" 
        fill="none" stroke="url(#logo-blue)" strokeWidth="11" strokeLinecap="round" />

  <!-- Heart Right Side (Green Leaf) -->
  <path d="M 100,160 C 105,145 142,130 142,100 C 142,80 132,70 122,80 C 112,90 102,99 100,102 Z" 
        fill="url(#logo-green)" />
        
  <!-- Leaf Center Vein -->
  <path d="M 102,150 C 112,132 122,118 132,95" 
        fill="none" stroke="#ffffff" strokeWidth="2.5" strokeLinecap="round" opacity="0.75" />

  <!-- Letters "HB" Center -->
  <text x="94" y="125" fontFamily="system-ui, -apple-system, sans-serif" fontWeight="900" fontSize="36" fill="#1e3a8a" textAnchor="middle" letterSpacing="-1.5">
    HB
  </text>
</svg>